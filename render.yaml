# Render blueprint for the ChatConnect backend.
# In Render: New → Blueprint → point at this repo. Set the "sync: false" vars
# (MONGO_URI, CLIENT_URL) in the dashboard after the first deploy.
services:
  - type: web
    name: chatconnect-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: MONGO_URI
        sync: false # set in dashboard (MongoDB Atlas SRV string incl. /chatconnect)
      - key: CLIENT_URL
        sync: false # set to your deployed frontend origin, e.g. https://chatconnect.vercel.app
      # Email verification is ON: signup issues an OTP that must be verified
      # before the account can log in. Requires the SMTP vars below to be set in
      # the dashboard (the pipeline is built and verified). PIN reset ("forgot
      # chat-lock PIN") uses the same mailer.
      - key: ENABLE_EMAIL_VERIFICATION
        value: "true"
      # SMTP — set these in the dashboard (e.g. smtpout.secureserver.net / Brevo / SendGrid):
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: ChatConnect
      # Google sign-in: OAuth 2.0 Web Client ID from Google Cloud Console.
      # The SAME value must be built into the frontend as VITE_GOOGLE_CLIENT_ID.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Web Push (VAPID) — notifications when the app is closed.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:support@chatconnect.app
      # Optional: comma-separated additional allowed origins
      # - key: EXTRA_CORS_ORIGINS
      #   value: https://staging.yourdomain.com
