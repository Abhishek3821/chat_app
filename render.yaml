# Render blueprint for the ChatConnect backend.
# In Render: New → Blueprint → point at this repo. Set the "sync: false" vars
# (MONGO_URI, CLIENT_URL) in the dashboard after the first deploy.
services:
  - type: web
    name: chatconnect-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: MONGO_URI
        sync: false # set in dashboard (MongoDB Atlas SRV string incl. /chatconnect)
      - key: CLIENT_URL
        sync: false # set to your deployed frontend origin, e.g. https://chatconnect.vercel.app
      # Email verification is OFF until an SMTP provider is configured — otherwise
      # new users could never receive their code. TO ENABLE (recommended before a
      # real launch): set this to "true" AND set EMAIL_HOST/USER/PASS below in the
      # dashboard. The mail pipeline is already built and verified.
      - key: ENABLE_EMAIL_VERIFICATION
        value: "false"
      # SMTP (uncomment/set in the dashboard when you turn verification on):
      # - key: EMAIL_HOST      # e.g. smtp-relay.brevo.com / smtp.gmail.com / smtp.sendgrid.net
      #   sync: false
      # - key: EMAIL_PORT
      #   value: "587"
      # - key: EMAIL_USER
      #   sync: false
      # - key: EMAIL_PASS
      #   sync: false
      # - key: EMAIL_FROM
      #   value: ChatConnect <no-reply@chatconnect.app>
      # Optional: comma-separated additional allowed origins
      # - key: EXTRA_CORS_ORIGINS
      #   value: https://staging.yourdomain.com
